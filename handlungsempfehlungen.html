<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handlungsempfehlungen DPP – Eurotube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    #btn-fullscreen, #btn-download, #btn-github {
      position: fixed;
      right: 20px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
      z-index: 10;
      text-decoration: none;
      width: 120px;
      text-align: center;
      display: block;
    }
    #btn-fullscreen { bottom: 20px; }
    #btn-download   { bottom: 70px; }
    #btn-github     { bottom: 120px; }
    #btn-fullscreen:hover, #btn-download:hover, #btn-github:hover { background: rgba(255,255,255,0.3); }

    /* Im echten Fullscreen-Modus Buttons ausblenden */
    :fullscreen #btn-fullscreen,
    :fullscreen #btn-download,
    :fullscreen #btn-github { display: none; }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <button id="btn-fullscreen" onclick="openFullscreen()">⛶ Vollbild</button>
  <a id="btn-download" href="Handlungsempfehlungen_DPP.pdf" download="Handlungsempfehlungen_DPP.pdf">⬇ Download</a>
  <a id="btn-github" href="https://github.com/DPPIP/DPP-EUROTUBE" target="_blank">↗ GitHub</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const canvas = document.getElementById('pdf-canvas');
    const ctx    = canvas.getContext('2d');
    let   currentPage = null;

    function render(page) {
      const vw  = window.innerWidth;
      const vh  = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      const vp0 = page.getViewport({ scale: 1 });
      const scale = Math.min(vw / vp0.width, vh / vp0.height) * dpr;
      const vp  = page.getViewport({ scale });
      canvas.width  = vp.width;
      canvas.height = vp.height;
      canvas.style.width  = (vp.width  / dpr) + 'px';
      canvas.style.height = (vp.height / dpr) + 'px';
      page.render({ canvasContext: ctx, viewport: vp });
    }

    pdfjsLib.getDocument('Handlungsempfehlungen_DPP.pdf').promise
      .then(pdf => pdf.getPage(1))
      .then(page => {
        currentPage = page;
        render(page);
        window.addEventListener('resize', () => render(page));
      });

    function openFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen)           el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen)     el.msRequestFullscreen();
    }

    // Nach Vollbild-Wechsel neu rendern (Auflösung anpassen)
    document.addEventListener('fullscreenchange', () => {
      if (currentPage) render(currentPage);
    });
  </script>
</body>
</html>
