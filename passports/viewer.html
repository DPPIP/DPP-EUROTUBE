<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Product Passport</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F1EC;--card:#FDFCFA;--ink:#1A1916;--muted:#7A7870;--accent:#2D5A3D;--border:#DDD9D1;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
body{background:var(--bg);font-family:var(--sans);color:var(--ink);padding:2rem 1rem}
.wrap{max-width:520px;margin:0 auto}
.badge{background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.12em;padding:4px 10px;border-radius:4px;text-transform:uppercase;display:inline-block}
.badge-v2{background:#2980b9;color:#fff;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.12em;padding:4px 10px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-left:6px}
h1{font-size:24px;font-weight:300;margin:.5rem 0 .25rem}
.sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:1.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;font-family:var(--mono)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.metric label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.metric .val{font-size:30px;font-weight:300;line-height:1}
.metric .unit{font-size:13px;color:var(--muted);margin-left:2px}
.metric.full{grid-column:1/-1}
.row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.row:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.key{color:var(--muted);flex:1}
.vm{font-family:var(--mono);font-size:12px}
.qr-wrap{text-align:center;padding:.5rem 0}
#qrcode{display:inline-block;padding:6px;background:#fff;border:1px solid var(--border);border-radius:8px}
#qrcode canvas,#qrcode img{display:block}
.uri{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:8px;word-break:break-all}
.single-link{display:block;text-align:center;margin-top:.75rem;font-size:12px;color:var(--accent);font-family:var(--mono)}
.footer{text-align:center;font-size:11px;color:var(--muted);margin-top:2rem;font-family:var(--mono)}
.loading{text-align:center;padding:3rem;color:var(--muted);font-family:var(--mono)}
.error{text-align:center;padding:3rem;color:#A03030;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap" id="content">
  <p class="loading">Lade Passport…</p>
</div>

<script>
(function() {
  var params  = new URLSearchParams(window.location.search);
  var sn      = params.get('sn');
  var single  = params.get('single');
  var BASE    = 'https://DPPIP.github.io/DPP-EUROTUBE';

  if (!sn) {
    document.getElementById('content').innerHTML =
      '<p class="error">Kein Segment angegeben (?sn=SN-xxx)</p>';
    return;
  }

  document.title = 'DPP \u2013 ' + sn;

  fetch(BASE + '/passports/' + sn + '.jsonld', {cache:'no-store'})
    .then(function(r) {
      if (!r.ok) throw new Error('Nicht gefunden');
      return r.json();
    })
    .then(function(jld) {
      // HyperloopBatch type redirect
      var types = jld['@type'] || [];
      if (!Array.isArray(types)) types = [types];
      var isBatch = types.some(function(t){ return typeof t === 'string' && t.endsWith('HyperloopBatch'); });
      if (isBatch) {
        window.location.replace('../batch/index.html?batch=' + encodeURIComponent(sn));
        return;
      }
      // Batch-Redirect (ausser bei ?single=1)
      if (!single) {
        var b = jld['bsdd:BatchID'];
        if (b) {
          fetch(BASE + '/batch/' + b + '.jsonld', {method:'HEAD'})
            .then(function(r) {
              if (r.ok) window.location.replace(
                '../batch/index.html?batch=' + encodeURIComponent(b) + '&scanned_sn=' + encodeURIComponent(sn)
              );
            }).catch(function(){});
        }
      }
      render(jld, sn, BASE);
    })
    .catch(function(err) {
      document.getElementById('content').innerHTML =
        '<p class="error">Passport nicht gefunden:<br>' + sn + '</p>';
    });

  function val(obj) {
    if (!obj) return '–';
    if (typeof obj === 'object') return obj['@value'] || '–';
    return obj || '–';
  }

  function render(jld, sn, base) {
    var uri    = jld['@id'] || (base + '/passports/' + sn + '.jsonld');
    var datum   = val(jld['bsdd:ManufactoringDate']);
    var temp    = val(jld['bsdd:ReferenceEnvironmentTemperature']);
    var hum     = val(jld['bsdd:ReferenceAirRelativeHumidity']);
    var dauer   = val(jld['bsdd:Schalungsdauer']);
    var batch   = jld['bsdd:BatchID'] || '–';
    var maker   = jld['dcterms:creator'] || '–';
    var beton   = jld['bsdd:StrengthClass'] || '–';
    var ort     = jld['bsdd:AssemblyPlace'] || '–';
    var status  = jld['bsdd:Status'] || '–';

    document.getElementById('content').innerHTML =
      '<span class="badge">Digital Product Passport</span>' +
      '<span class="badge-v2">QR-Verknüpft</span>' +
      '<h1>Beton-Fertigelement Typ A</h1>' +
      '<p class="sub">' + datum + ' &nbsp;&middot;&nbsp; ' + sn + '</p>' +

      '<div class="card">' +
        '<p class="card-label">Produktionsdaten</p>' +
        '<div class="metrics">' +
          '<div class="metric"><label>Temperatur (&oslash;)</label>' +
            '<span class="val">' + temp + '<span class="unit">&deg;C</span></span></div>' +
          '<div class="metric"><label>Luftfeuchtigkeit (&oslash;)</label>' +
            '<span class="val">' + hum + '<span class="unit">%</span></span></div>' +
          '<div class="metric full"><label>Schalungsdauer</label>' +
            '<span class="val">' + dauer + '<span class="unit"> h</span></span></div>' +
        '</div>' +
      '</div>' +

      '<div class="card">' +
        '<p class="card-label">Identifikation</p>' +
        '<div class="row"><span class="dot"></span><span class="key">Segment ID</span><span class="vm">' + sn + '</span></div>' +
        '<div class="row"><span class="dot"></span><span class="key">Betonsorte</span><span class="vm">' + beton + '</span></div>' +
        '<div class="row"><span class="dot"></span><span class="key">Herstellungsort</span><span class="vm">' + ort + '</span></div>' +
        '<div class="row"><span class="dot"></span><span class="key">Hersteller</span><span class="vm">' + maker + '</span></div>' +
        '<div class="row"><span class="dot"></span><span class="key">Batch</span><span class="vm">' + batch + '</span></div>' +
        '<div class="row"><span class="dot"></span><span class="key">Status</span>' +
          '<span class="vm" style="color:var(--accent)">' + status + '</span></div>' +
      '</div>' +

      '<div class="card">' +
        '<p class="card-label">QR-Code &ndash; dieser Passport</p>' +
        '<div class="qr-wrap">' +
          '<div id="qrcode"></div>' +
          '<p class="uri">' + uri + '</p>' +
        '</div>' +
        '<a class="single-link" href="?sn=' + sn + '&single=1">&rarr; Nur dieser Passport anzeigen</a>' +
      '</div>' +

      '<p class="footer">Hyperloop Digital Twin &middot; ' + datum + '<br>' +
        'JSON-LD: <a href="' + sn + '.jsonld" style="color:var(--accent)">' + sn + '.jsonld</a>' +
      '</p>';

    // QR-Code generieren
    new QRCode(document.getElementById('qrcode'), {
      text: uri, width: 148, height: 148,
      correctLevel: QRCode.CorrectLevel.M
    });
  }
})();
</script>
</body>
</html>
